# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://github.com

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: PFLB_Project

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

  schedule:
    - cron: '00 12 * * *'

jobs:
  build:

    runs-on: ubuntu-latest

    # Добавляем явные права записи для токена внутри самой сборки
    permissions:
      contents: write

    env:
      EMAIL: ${{secrets.EMAIL}}
      PASSWORD: ${{secrets.PASSWORD}}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        # ИСПРАВЛЕНО: v5 нативно работает на Node 24 и полностью убирает варнинги депрекации
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean -DEmail=$EMAIL -DPassword=$PASSWORD test

      - name: Get Allure history
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from marketplace
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          # ИСПРАВЛЕНО: Перенесено из env в блок with. Имя параметра изменено на github_token
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
